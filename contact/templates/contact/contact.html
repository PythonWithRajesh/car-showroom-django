<!DOCTYPE html>
{% extends 'base.html' %}

{% load static %}

{% block content %}
  <title>Contact Us</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #d9e4f5);
      font-family: Arial;
    }
    
    .contact-box {
      max-width: 650px;
      margin: 60px auto;
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    }
    
    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 25px;
    }
    
    .title i {
      color: #0d6efd;
      margin-right: 8px;
    }
    
    .form-control {
      border-radius: 12px;
      padding: 10px;
    }
    
    .btn-submit {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      background: #0d6efd;
      color: white;
      border: none;
      transition: 0.3s;
    }
    
    .btn-submit:hover {
      background: #084298;
      transform: scale(1.02);
    }
    
    .alert-box {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    
    .success {
      background: #d4edda;
      color: #155724;
    }
    
    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>

  <body>
    <div class="contact-box">
      <h2 class="title"><i class="fa-solid fa-envelope"></i> Contact Us</h2>

      <!-- 🔥 Messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="alert-box success">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <!-- FORM -->
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label>Name</label>
          <input type="text" name="name" class="form-control" placeholder="Enter your name" />
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" name="email" class="form-control" placeholder="Enter your email" />
        </div>

        <div class="mb-3">
          <label>Mobile</label>
          <input type="text" name="mobile" class="form-control" placeholder="Enter your mobile" />
        </div>

        <div class="mb-3">
          <label>Message</label>
          <textarea name="message" rows="4" class="form-control" placeholder="Write your message"></textarea>
        </div>

        <button type="submit" class="btn-submit">Send Message</button>
      </form>
    </div>
  </body>
{% endblock %}
