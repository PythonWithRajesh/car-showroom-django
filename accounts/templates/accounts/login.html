{% extends 'base.html' %}

{% load static %}

{% block content %}
  <div class="container-fluid">
    <div class="row min-vh-100">
      <!-- LEFT SIDE IMAGE -->
      <div class="col-md-6 d-none d-md-block p-0">
        <div style="
                background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1470&auto=format&fit=crop');
                background-size:cover;
                background-position:center;
                height:100vh;
            "></div>
      </div>

      <!-- RIGHT SIDE LOGIN FORM -->
      <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">
        <div class="card shadow-lg border-0 rounded-4 p-5" style="width:100%; max-width:450px;">
          <div class="text-center mb-4">
            <h1 class="fw-bold">Car Showroom</h1>

            <p class="text-muted">Login to continue</p>
          </div>

          {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
          {% endif %}

          <form method="POST">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>

              <input type="text" name="username" class="form-control form-control-lg rounded-3" placeholder="Enter username" />
            </div>

            <!-- PASSWORD -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>

              <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="Enter password" />
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-dark btn-lg w-100 rounded-3">Login</button>
          </form>

          <!-- FOOTER -->
          <div class="text-center mt-4">
            <small class="text-muted">© 2026 Car Showroom Management System</small>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
