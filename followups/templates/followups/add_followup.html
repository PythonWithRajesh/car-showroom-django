{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}
  <div class="container mt-5">
    <div class="card shadow p-5">
      <h2 class="mb-4">Add Followup</h2>

      <form method="POST">
        {% csrf_token %}

        {{ form|crispy }}

        <button class="btn btn-dark mt-3">Save Followup</button>
      </form>
    </div>
  </div>
{% endblock %}
