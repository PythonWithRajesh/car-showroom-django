{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}
  <div class="card shadow border-0">
    <div class="card-body">
      <h2 class="mb-4">Add Customer</h2>

      <form method="POST">
        {% csrf_token %}

        {{ form|crispy }}

        <button class="btn btn-success">Save Customer</button>
      </form>
    </div>
  </div>
{% endblock %}
