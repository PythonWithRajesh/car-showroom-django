{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="container mt-4">
    <div class="card shadow p-4">
      <h3 class="mb-4">Add Finance</h3>

      <form method="POST">
        {% csrf_token %}

        {{ form|crispy }}

        <button type="submit" class="btn btn-success">Save Finance</button>
      </form>
    </div>
  </div>
{% endblock %}
